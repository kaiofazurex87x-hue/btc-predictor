services:
  - type: web
    name: btc-predictor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120
    plan: free
    envVars:
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11
